name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'travelo_frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'travelo_frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: travelo_frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('travelo_frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: travelo_frontend
        run: npm ci

      - name: Build React app
        working-directory: travelo_frontend
        run: npm run build
        env:
          CI: false

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./travelo_frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/travelo-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/travelo-frontend:${{ github.sha }}

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    # Rule : scanner seulement sur push vers main, pas sur pull_request
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/travelo-frontend:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'